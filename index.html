<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>La Eden — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050d0a; --surface: #0b1612; --border: #1a2e24;
      --accent: #c9a84c; --accent2: #8b5e1a; --text: #e8f0ec;
      --muted: #5e7a6a; --success: #2ecc71; --danger: #e55353;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px); background-size: 48px 48px; animation: gridMove 20s linear infinite; z-index: 0; }
    body::after { content: ''; position: fixed; top: -40%; left: -20%; width: 80%; height: 80%; background: radial-gradient(ellipse, rgba(201,168,76,0.08) 0%, transparent 70%); z-index: 0; animation: pulse 8s ease-in-out infinite alternate; }
    @keyframes gridMove { from { background-position: 0 0; } to { background-position: 48px 48px; } }
    @keyframes pulse { from { opacity: 0.5; transform: scale(1); } to { opacity: 1; transform: scale(1.1); } }
    .login-wrap { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 20px; animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .brand { text-align: center; margin-bottom: 36px; }
    .brand-icon { width: 56px; height: 56px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 26px; margin-bottom: 14px; box-shadow: 0 0 32px rgba(201,168,76,0.3); }
    .brand h1 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .brand h1 span { color: var(--accent); }
    .brand p { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px; box-shadow: 0 24px 64px rgba(0,0,0,0.5); }
    .role-tabs { display: flex; background: var(--bg); border-radius: 10px; padding: 4px; margin-bottom: 28px; border: 1px solid var(--border); }
    .role-tab { flex: 1; padding: 8px; border: none; background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 7px; transition: all 0.2s; }
    .role-tab.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; font-weight: 600; }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .field input { width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }
    .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 10px; color: #000; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: all 0.2s; box-shadow: 0 4px 20px rgba(201,168,76,0.25); }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(201,168,76,0.4); }
    .error-msg { color: var(--danger); font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; opacity: 0; transition: opacity 0.2s; }
    .error-msg.show { opacity: 1; }
    .footer-note { text-align: center; color: var(--muted); font-size: 12px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand">
      <div class="brand-icon">🌿</div>
      <h1>La <span>Eden</span></h1>
      <p>Production FMS Platform</p>
    </div>
    <div class="card">
      <div class="role-tabs">
        <button class="role-tab active" onclick="setRole('admin')">👑 Admin</button>
        <button class="role-tab" onclick="setRole('staff')">👤 Staff</button>
      </div>
      <div class="field">
        <label>User ID</label>
        <input type="text" id="userId" placeholder="Enter your user ID" autocomplete="off"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" onkeydown="if(event.key==='Enter') doLogin()"/>
      </div>
      <button class="btn-login" onclick="doLogin()">Login to Dashboard →</button>
      <div class="error-msg" id="errMsg">Galat User ID ya Password.</div>
    </div>
    <p class="footer-note">La Eden v1.0 · Production FMS</p>
  </div>
  <script>
    const USERS = {
      admin: [
        { id:"admin",  password:"admin123",  name:"Admin", role:"admin" },
        { id:"owner",  password:"owner@123", name:"Owner", role:"admin" },
      ],
      staff: [
        { id:"staff1", password:"staff123", name:"Raju",   role:"staff" },
        { id:"staff2", password:"staff456", name:"Priya",  role:"staff" },
        { id:"staff3", password:"staff789", name:"Deepak", role:"staff" },
      ]
    };
    let activeRole = 'admin';
    function setRole(role) {
      activeRole = role;
      document.querySelectorAll('.role-tab').forEach((t,i) => t.classList.toggle('active',(role==='admin'&&i===0)||(role==='staff'&&i===1)));
      document.getElementById('userId').value=''; document.getElementById('password').value='';
      document.getElementById('errMsg').classList.remove('show');
    }
    function doLogin() {
      const userId=document.getElementById('userId').value.trim();
      const password=document.getElementById('password').value;
      if(!userId||!password){showErr('User ID aur Password dono bharein.');return;}
      const user=USERS[activeRole].find(u=>u.id===userId&&u.password===password);
      if(user){sessionStorage.setItem('wd_user',JSON.stringify(user));window.location.href='dashboard.html';}
      else showErr('Galat User ID ya Password.');
    }
    function showErr(m){const e=document.getElementById('errMsg');e.textContent=m;e.classList.add('show');}
  </script>
</body>
</html>
